<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Temperature Converter</h1>

        <div class="input-group">
            <label>Enter Temperature</label>
            <input type="number" id="temperature" placeholder="Enter value">
        </div>

        <div class="input-group">
            <label>Convert From</label>
            <select id="unit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>
        </div>

        <button onclick="convertTemperature()">
            Convert
        </button>

        <div class="result" id="result">
            Converted temperature will appear here
        </div>

    </div>

    <script>
        function convertTemperature() {

            let temp = document.getElementById("temperature").value;
            let unit = document.getElementById("unit").value;
            let result = document.getElementById("result");

            if(temp === "") {
                result.innerHTML = "Please enter a temperature value.";
                return;
            }

            temp = parseFloat(temp);

            let output = "";

            if(unit === "celsius") {

                let f = (temp * 9/5) + 32;
                let k = temp + 273.15;

                output =
                `${temp} °C = ${f.toFixed(2)} °F <br>
                 ${temp} °C = ${k.toFixed(2)} K`;

            }

            else if(unit === "fahrenheit") {

                let c = (temp - 32) * 5/9;
                let k = c + 273.15;

                output =
                `${temp} °F = ${c.toFixed(2)} °C <br>
                 ${temp} °F = ${k.toFixed(2)} K`;

            }

            else if(unit === "kelvin") {

                let c = temp - 273.15;
                let f = (c * 9/5) + 32;

                output =
                `${temp} K = ${c.toFixed(2)} °C <br>
                 ${temp} K = ${f.toFixed(2)} °F`;

            }

            result.innerHTML = output;
        }
    </script>

</body>
</html>
